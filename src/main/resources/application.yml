server:
  port: 8080

spring:
  application:
    name: workflow-backend-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            scope: openid,profile,email,offline_access,https://graph.microsoft.com/Mail.Send
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/{tenant-id}/v2.0
            authorization-uri: https://login.microsoftonline.com/{tenant-id}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/{tenant-id}/oauth2/v2.0/token

  messages:
    basename: i18n/messages
    encoding: UTF-8

flowable:
  database-schema-update: true
  async-executor-activate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
